name: Publish to npm

# Publishes when you cut a GitHub Release. The release tag (e.g. v1.0.1)
# should match the version in package.json.
on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) needs npm >= 11.5.1; node 20 ships an older npm.
      - run: npm install -g npm@latest

      - run: bun install --frozen-lockfile

      - run: bun run check

      # No token: npm authenticates via the GitHub OIDC identity (id-token: write).
      # prepublishOnly (tsc + bun build) runs automatically before publish.
      # Trusted Publishing attaches provenance automatically.
      - run: npm publish --access public
